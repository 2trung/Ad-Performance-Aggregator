name: CI/CD

on:
  push:
  pull_request:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Run tests and build JAR
        run: mvn -B test package

      - name: Upload packaged JAR as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ad-performance-aggregator-jar
          path: target/ad-performance-aggregator-1.0-SNAPSHOT.jar
          if-no-files-found: error

